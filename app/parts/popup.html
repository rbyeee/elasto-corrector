<div class="popup-default mfp-hide" id="popup">
	<div class="popup-wrapper">
		<div class="popup__label">задайте нам ваш вопрос</div>

		<form class="popup-form">
			<div class="footer__container">
				<div class="footer__item">
					<input
						type="text"
						placeholder="Имя"
						required
						class="input input_default input-footer"
					/>
				</div>
				<div class="footer__item">
					<input
						type="text"
						required
						placeholder="Номер телефона"
						class="input input_default input-footer input-phone"
					/>
				</div>
				<div class="footer__item">
					<input
						type="mail"
						required
						placeholder="Электронная почта"
						class="input input_default input-footer"
					/>
				</div>

				<div class="footer__item">
					<textarea
						placeholder="Ваш вопрос"
						class="textarea textarea_default"
					></textarea>
				</div>
				<div class="footer__item">
					<label class="footer-file-input">
						<input
							type="file"
							placeholder="Прикрепить файл"
							class="input input_default input-file input-footer"
						/>
						<div class="input-file-line">Прикрепить файл</div>
						<div class="input-file-image">
							<svg
								width="22"
								height="23"
								viewBox="0 0 22 23"
								fill="none"
								xmlns="http://www.w3.org/2000/svg"
							>
								<path
									d="M20.4383 10.6622L11.2483 19.8522C10.1225 20.9781 8.59552 21.6106 7.00334 21.6106C5.41115 21.6106 3.88418 20.9781 2.75834 19.8522C1.63249 18.7264 1 17.1994 1 15.6072C1 14.015 1.63249 12.4881 2.75834 11.3622L11.9483 2.17222C12.6989 1.42166 13.7169 1 14.7783 1C15.8398 1 16.8578 1.42166 17.6083 2.17222C18.3589 2.92279 18.7806 3.94077 18.7806 5.00222C18.7806 6.06368 18.3589 7.08166 17.6083 7.83222L8.40834 17.0222C8.03306 17.3975 7.52406 17.6083 6.99334 17.6083C6.46261 17.6083 5.95362 17.3975 5.57834 17.0222C5.20306 16.6469 4.99222 16.138 4.99222 15.6072C4.99222 15.0765 5.20306 14.5675 5.57834 14.1922L14.0683 5.71222"
									stroke="#272727"
									stroke-width="2"
									stroke-linecap="round"
									stroke-linejoin="round"
								/>
							</svg>
						</div>
					</label>
				</div>
			</div>
			<label class="footer-check">
				<div class="input-checkbox">
					<input type="checkbox" />
					<span class="input-checkbox-item">
						<span class="check-arrow"></span>
					</span>
				</div>
				<span class="input-checkbox-description"
					>Нажимая „Отправить“, вы соглашаетесь на обработку персональных данных
					в соответствии с <a href="#"> политикой конфиденциальности</a></span
				>
			</label>

			<div class="footer-button">
				<button type="submit" class="btn btn_default">Отправить</button>
			</div>
		</form>
	</div>

	<img src="./images/dist/popup-line.png" alt="" class="popup-line" />
</div>
